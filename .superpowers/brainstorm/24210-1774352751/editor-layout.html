<h2>포스트 에디터 레이아웃</h2>
<p class="subtitle">새 글 작성 / 수정할 때의 화면 구성을 선택해주세요</p>

<div class="cards">

  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f7f6f3;border-radius:6px;font-family:system-ui;">
      <div style="max-width:580px;margin:0 auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <span style="font-size:9px;color:#9b9a97;">← 취소</span>
          <div style="display:flex;gap:6px;">
            <span style="font-size:8px;border:1px solid #e9e9e7;padding:3px 10px;border-radius:4px;color:#6b6f76;">임시저장</span>
            <span style="font-size:8px;background:#6c47ff;color:#fff;padding:3px 10px;border-radius:4px;">발행</span>
          </div>
        </div>
        <input class="mock-input" placeholder="제목을 입력하세요" style="font-size:14px;font-weight:700;border:none;border-bottom:2px solid #e9e9e7;border-radius:0;padding:6px 0;margin-bottom:10px;width:100%;">
        <textarea class="mock-input" style="height:110px;resize:none;font-size:9px;border:1px solid #e9e9e7;border-radius:6px;padding:8px;width:100%;box-sizing:border-box;" placeholder="내용을 작성하세요..."></textarea>
        <div style="display:flex;gap:6px;margin-top:8px;">
          <select class="mock-input" style="font-size:8px;padding:4px 8px;flex:1;">
            <option>draft</option>
            <option>published</option>
          </select>
          <input class="mock-input" placeholder="슬러그 (선택)" style="font-size:8px;padding:4px 8px;flex:2;">
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 풀페이지 에디터</h3>
      <p>제목 크게, 넓은 textarea, 상단에 임시저장/발행 버튼. 글쓰기에 집중.</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:16px;background:#f7f6f3;border-radius:6px;font-family:system-ui;">
      <div style="display:flex;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:11px;font-weight:600;color:#37352f;margin-bottom:8px;">✏️ 새 글 작성</div>
          <div style="margin-bottom:6px;">
            <div style="font-size:8px;color:#37352f;font-weight:500;margin-bottom:3px;">제목</div>
            <input class="mock-input" placeholder="제목" style="font-size:9px;padding:5px 8px;width:100%;box-sizing:border-box;">
          </div>
          <div style="margin-bottom:6px;">
            <div style="font-size:8px;color:#37352f;font-weight:500;margin-bottom:3px;">내용</div>
            <textarea class="mock-input" style="height:90px;resize:none;font-size:8px;padding:5px 8px;width:100%;box-sizing:border-box;" placeholder="내용..."></textarea>
          </div>
          <div style="margin-bottom:6px;">
            <div style="font-size:8px;color:#37352f;font-weight:500;margin-bottom:3px;">요약</div>
            <input class="mock-input" placeholder="excerpt" style="font-size:9px;padding:5px 8px;width:100%;box-sizing:border-box;">
          </div>
        </div>
        <div style="width:110px;flex-shrink:0;border-left:1px solid #e9e9e7;padding-left:10px;">
          <div style="font-size:8px;font-weight:600;color:#37352f;margin-bottom:8px;">발행 설정</div>
          <div style="margin-bottom:6px;">
            <div style="font-size:7px;color:#9b9a97;margin-bottom:3px;">상태</div>
            <select class="mock-input" style="font-size:8px;padding:3px 6px;width:100%;">
              <option>draft</option>
              <option>published</option>
            </select>
          </div>
          <div style="margin-bottom:6px;">
            <div style="font-size:7px;color:#9b9a97;margin-bottom:3px;">슬러그</div>
            <input class="mock-input" placeholder="url-slug" style="font-size:8px;padding:3px 6px;width:100%;box-sizing:border-box;">
          </div>
          <div style="margin-bottom:6px;">
            <div style="font-size:7px;color:#9b9a97;margin-bottom:3px;">포스트 타입</div>
            <select class="mock-input" style="font-size:8px;padding:3px 6px;width:100%;">
              <option>post</option>
              <option>page</option>
            </select>
          </div>
          <div style="margin-top:10px;display:flex;flex-direction:column;gap:4px;">
            <span style="font-size:8px;background:#6c47ff;color:#fff;padding:4px 0;border-radius:4px;text-align:center;">발행</span>
            <span style="font-size:8px;border:1px solid #e9e9e7;color:#6b6f76;padding:4px 0;border-radius:4px;text-align:center;">임시저장</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B — 본문 + 설정 사이드바</h3>
      <p>왼쪽 본문, 오른쪽에 상태/슬러그/타입 설정. WordPress 스타일.</p>
    </div>
  </div>

</div>
