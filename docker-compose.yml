services:
  # Database Service (MariaDB)
  db:
    image: mariadb:10.11
    container_name: cms_db
    restart: always
    ports:
      # .gemini.md Rule 3: Host 4807, Internal 3306
      - "4807:3306"
    environment:
      # These variables should be set in a .env file for local development
      # and injected as secrets in the CI/CD pipeline.
      MYSQL_ROOT_PASSWORD: ${CMS_MARIADB_PASSWORD}
      MYSQL_DATABASE: ${CMS_DB_NAME:-cmsdb}
      MYSQL_USER: ${CMS_DB_USER:-funnycms}
      MYSQL_PASSWORD: ${CMS_DB_APP_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend Service (Flask)
  backend:
    build: ./backend
    container_name: cms_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DATABASE_URL: mysql+pymysql://${CMS_DB_USER:-funnycms}:${CMS_DB_APP_PASSWORD}@db:3306/${CMS_DB_NAME:-cmsdb}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key}
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000"]
    volumes:
      - ./backend:/app
    develop:
      watch:
        # Python 소스 변경 → 컨테이너에 즉시 동기화 (Flask debug auto-reload 트리거)
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - "**/*.pyc"
            - venv/
            - uploads/
        # requirements.txt 변경 → 이미지 재빌드 (새 패키지 설치)
        - action: rebuild
          path: ./backend/requirements.txt

  # Frontend Service (React + Vite)
  frontend:
    build: ./frontend
    container_name: cms_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      # Vite proxy가 Docker 내부 네트워크의 backend 서비스로 연결되도록 지정
      BACKEND_URL: http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    develop:
      watch:
        # src/ 변경 → 즉시 동기화 (Vite HMR 트리거)
        - action: sync
          path: ./frontend/src
          target: /app/src
        # public/ 변경 → 즉시 동기화
        - action: sync
          path: ./frontend/public
          target: /app/public
        # package.json 변경 → 이미지 재빌드 (npm ci 재실행)
        - action: rebuild
          path: ./frontend/package.json

volumes:
  db_data: