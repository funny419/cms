[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle + pyflakes + isort
ignore = ["E501"]                # 줄 길이는 formatter에 위임

[tool.ruff.lint.per-file-ignores]
"models/__init__.py" = ["F401", "F403"]  # star import 허용

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_strict_optional = true
exclude = ["migrations/"]
