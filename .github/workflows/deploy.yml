name: Deploy CMS to Ubuntu

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # Ubuntu 머신에 설치된 Self-Hosted Runner를 사용한다고 가정
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        # 시크릿을 env 섹션으로 분리하여 로그 노출 방지
        env:
          CMS_MARIADB_PASSWORD: ${{ secrets.CMS_MARIADB_PASSWORD }}
          CMS_DB_APP_PASSWORD: ${{ secrets.CMS_DB_APP_PASSWORD }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          printf "CMS_MARIADB_PASSWORD=%s\nCMS_DB_APP_PASSWORD=%s\nCMS_DB_USER=funnycms\nCMS_DB_NAME=cmsdb\nSECRET_KEY=%s\nJWT_SECRET_KEY=%s\n" \
            "$CMS_MARIADB_PASSWORD" "$CMS_DB_APP_PASSWORD" "$FLASK_SECRET_KEY" "$JWT_SECRET_KEY" > .env
          echo ".env 파일 생성 완료"

      - name: Build and Run with Docker Compose
        # docker compose v2 사용, --remove-orphans로 고아 컨테이너 제거
        run: |
          docker compose -f docker-compose.prod.yml down --remove-orphans
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Verify deployment health
        # 컨테이너 안정화 후 비정상 종료 여부 확인
        run: |
          echo "컨테이너 안정화 대기 중 (30초)..."
          sleep 30

          docker compose -f docker-compose.prod.yml ps -a

          exited=$(docker compose -f docker-compose.prod.yml ps -a --filter status=exited -q)
          if [ -n "$exited" ]; then
            echo "비정상 종료된 컨테이너가 감지되었습니다. 로그를 확인하세요." >&2
            docker compose -f docker-compose.prod.yml logs --tail=100
            exit 1
          fi
          echo "모든 컨테이너가 정상 실행 중입니다."

      - name: Rollback on failure
        if: failure()
        continue-on-error: true
        env:
          PREV_SHA: ${{ github.event.before }}
          MSG_ROLLBACK_START: "배포 실패 감지 — 이전 버전으로 롤백 시도 중..."
          MSG_ROLLBACK_SKIP: "이전 커밋 SHA가 없어 롤백을 건너뜁니다."
          MSG_ROLLBACK_DONE: "롤백 완료"
        run: |
          if [ -z "$PREV_SHA" ]; then
            echo "$MSG_ROLLBACK_SKIP"
            exit 0
          fi
          echo "$MSG_ROLLBACK_START"
          git checkout "$PREV_SHA"
          docker compose -f docker-compose.prod.yml down --remove-orphans
          docker compose -f docker-compose.prod.yml up -d --build
          echo "$MSG_ROLLBACK_DONE"
          echo "ROLLBACK_DONE=true" >> $GITHUB_ENV

      - name: Send Discord Notification on Success
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MSG_TITLE: "🚀 **배포 성공**"
          MSG_BODY: "CMS 서비스가 프로덕션에 정상 배포되었습니다."
        run: |
          SHA="${{ github.sha }}"
          FULL_MSG="${MSG_TITLE} : ${MSG_BODY} (by @${{ github.actor }}, commit: ${SHA:0:7})"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${FULL_MSG}\"}"

      - name: Send Discord Notification on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MSG_TITLE_FAIL: "🔥 **배포 실패**"
          MSG_BODY_FAIL: "CMS 서비스 배포 중 오류가 발생했습니다."
          MSG_TITLE_ROLLBACK: "🔄 **배포 실패 — 롤백 완료**"
          MSG_BODY_ROLLBACK: "배포 실패로 이전 버전으로 롤백되었습니다."
        run: |
          SHA="${{ github.sha }}"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$ROLLBACK_DONE" = "true" ]; then
            TITLE="$MSG_TITLE_ROLLBACK"
            BODY="$MSG_BODY_ROLLBACK"
          else
            TITLE="$MSG_TITLE_FAIL"
            BODY="$MSG_BODY_FAIL"
          fi
          FULL_MSG="${TITLE} : ${BODY} (by @${{ github.actor }}, commit: ${SHA:0:7})\n> [워크플로우 로그 확인](${WORKFLOW_URL})"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${FULL_MSG}\"}"

      - name: Clean up
        # 보안을 위해 생성된 .env 파일 삭제
        if: always()
        run: rm -f .env
