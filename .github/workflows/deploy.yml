name: Deploy CMS to Windows

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # 윈도우 머신에 설치된 Self-Hosted Runner를 사용한다고 가정
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        # 배포 시점에 Secrets를 조합하여 .env 파일을 동적으로 생성합니다.
        # Windows Runner의 기본 셸인 PowerShell 문법을 사용하여 안정성을 높입니다.
        run: |
          @"
          CMS_MARIADB_PASSWORD=${{ secrets.CMS_MARIADB_PASSWORD }}
          CMS_DB_APP_PASSWORD=${{ secrets.CMS_MARIADB_PASSWORD }}
          CMS_DB_USER=funnycms
          CMS_DB_NAME=cmsdb
          FLASK_APP=app.py
          FLASK_DEBUG=0
          SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}
          VITE_API_BASE_URL=http://localhost:5000
          "@ | Set-Content -Path .env -NoNewline
        shell: powershell

      - name: Build and Run with Docker Compose
        # 기존 컨테이너를 내리고, 이미지를 새로 빌드하여 실행합니다.
        # 프로덕션용 compose 파일을 명시적으로 사용합니다.
        run: |
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d --build
        shell: powershell

      - name: Send Discord Notification on Success
        if: success()
        # 한글 텍스트를 환경 변수로 분리하여 인코딩 오염 방지
        env:
          MSG_TITLE: "🚀 **배포 성공**"
          MSG_BODY: "CMS 서비스가 프로덕션에 정상 배포되었습니다."
        run: |
          # 1. 환경 변수에서 값 가져오기 (GitHub가 UTF-8로 주입함)
          $title = $env:MSG_TITLE
          $body = $env:MSG_BODY
          $actor = "${{ github.actor }}"
          $sha = "${{ github.sha }}".Substring(0, 7)

          # 2. 메시지 조립 (특수문자 @ 에러 방지를 위해 변수 분리)
          $fullMsg = "$title : $body (by @$actor, commit: $sha)"
          
          # 3. JSON 수동 조립 (ConvertTo-Json의 한글 버그 회피)
          $jsonPayload = "{ ""content"": ""$fullMsg"" }"

          # 4. UTF-8 바이너리로 변환하여 전송
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          $byteData = $utf8NoBom.GetBytes($jsonPayload)

          Invoke-WebRequest -Uri "${{ secrets.DISCORD_WEBHOOK_URL }}" `
                            -Method Post `
                            -ContentType "application/json; charset=utf-8" `
                            -Body $byteData `
                            -UseBasicParsing
        shell: powershell

      - name: Send Discord Notification on Failure
        if: failure()
        env:
          MSG_TITLE: "🔥 **배포 실패**"
          MSG_BODY: "CMS 서비스 배포 중 오류가 발생했습니다."
        run: |
          $title = $env:MSG_TITLE
          $body = $env:MSG_BODY
          $actor = "${{ github.actor }}"
          $sha = "${{ github.sha }}".Substring(0, 7)
          $workflow_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          $fullMsg = "$title : $body (by @$actor, commit: $sha) \n> [워크플로우 로그 확인]($workflow_url)"
          
          $jsonPayload = "{ ""content"": ""$fullMsg"" }"

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          $byteData = $utf8NoBom.GetBytes($jsonPayload)

          Invoke-WebRequest -Uri "${{ secrets.DISCORD_WEBHOOK_URL }}" `
                            -Method Post `
                            -ContentType "application/json; charset=utf-8" `
                            -Body $byteData `
                            -UseBasicParsing
        shell: powershell

      - name: Clean up
        # 보안을 위해 생성된 .env 파일 삭제
        run: Remove-Item -Path .env -Force -ErrorAction SilentlyContinue
        if: always()
        shell: powershell