name: Deploy CMS to Windows

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    # 윈도우 머신에 설치된 Self-Hosted Runner를 사용한다고 가정
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        # 배포 시점에 Secrets를 조합하여 .env 파일을 동적으로 생성합니다.
        # Windows Runner의 기본 셸인 PowerShell 문법을 사용하여 안정성을 높입니다.
        run: |
          @"
          CMS_MARIADB_PASSWORD=${{ secrets.CMS_MARIADB_PASSWORD }}
          CMS_DB_APP_PASSWORD=${{ secrets.CMS_MARIADB_PASSWORD }}
          CMS_DB_USER=funnycms
          CMS_DB_NAME=cmsdb
          FLASK_APP=app.py
          FLASK_DEBUG=0
          SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}
          VITE_API_BASE_URL=http://localhost:5000
          "@ | Set-Content -Path .env -NoNewline
        shell: powershell

      - name: Build and Run with Docker Compose
        # 기존 컨테이너를 내리고, 이미지를 새로 빌드하여 실행합니다.
        # 프로덕션용 compose 파일을 명시적으로 사용합니다.
        run: |
          docker-compose -f docker-compose.prod.yml down
          docker-compose -f docker-compose.prod.yml up -d --build
        shell: powershell

      - name: Clean up
        # 보안을 위해 생성된 .env 파일 삭제
        run: Remove-Item -Path .env -Force -ErrorAction SilentlyContinue
        if: always()
        shell: powershell