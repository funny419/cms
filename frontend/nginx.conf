# API Rate Limiting — 전체 API 기준 여유있게 설정 (Flask-Limiter가 /login 10/min 별도 적용 중)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
    listen 80;
    server_name localhost;
    client_max_body_size 10m;  # DoS 방어 (backend MAX_CONTENT_LENGTH=10MB 일치)

    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 6;

    server_tokens off;
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 업로드 파일 직접 서빙 (uploads_data 볼륨 마운트 필요)
    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    # Proxy API requests to the backend service
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # RSS 피드 — Flask BE가 처리 (/blog/:username/feed.xml)
    location ~ ^/blog/.*/feed\.xml$ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}